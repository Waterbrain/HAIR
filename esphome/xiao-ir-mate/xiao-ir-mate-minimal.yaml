# ============================================================================
# HAIR ESPHome Config
# ----------------------------------------------------------------------------
# Device:            Seeed Studio XIAO Smart IR Mate (ESP32-C3 based)
# Hardware revision: v1.0
# Variant:           minimal
# Contributor:       DAB-LABS (derived from @Didgeridrew's full config)
# Source:            in-house (derived from https://community.home-assistant.io/t/1010610/12)
# License:           Apache 2.0
# Tested against:
#   HAIR:            0.1.2
#   HA Core:         2026.5.2
#   ESPHome:         2026.4.5
# Last verified:     2026-05-25
# Purpose:           RX+TX
# Hardware purchase: https://www.seeedstudio.com/Seeed-XIAO-Smart-IR-Mate.html
# GPIO map:
#   GPIO3            IR TX (remote_transmitter)
#   GPIO4            IR RX (remote_receiver, inverted)
# Notes:
#   - Smallest config that gets IR TX + RX working with HAIR on the XIAO
#     IR Mate. Touch sensor, RGB LED, and vibration motor are not configured.
#   - For the full hardware config, see xiao-ir-mate-full.yaml.
# ============================================================================

substitutions:
  name: ir-mate
  friendly_name: IR Mate

esphome:
  name: ${name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}

esp32:
  board: seeed_xiao_esp32c3
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret ap_password

captive_portal:

# --- IR Transmitter (TX) ---
remote_transmitter:
  id: ir_tx
  pin: GPIO3
  carrier_duty_percent: 50%
  non_blocking: true

# --- IR Receiver (RX) ---
# This hardware block defines the IR receiver pin and timing. The
# infrared: platform below references its id to register the receiver
# as a native HA InfraredReceiverEntity, which HAIR subscribes to via
# infrared.async_subscribe_receiver() on HA 2026.6+.
#
# The legacy on_pronto event-bus bridge that HAIR used on HA
# 2026.4-2026.5 is preserved below as commented-out historical
# reference. It is no longer active and no longer needed on 2026.6+.
# Uncomment it only if you are running an older HA version that
# predates native InfraredReceiverEntity support.
remote_receiver:
  id: ir_rx
  pin:
    number: GPIO4
    inverted: true
  dump: all
  tolerance: 25%
  idle: 10ms

  # Legacy HAIR bridge (pre-2026.6). No longer needed on HA 2026.6+.
  # on_pronto:
  #   then:
  #     - homeassistant.event:
  #         event: esphome.remote_received
  #         data:
  #           protocol: "PRONTO"
  #           code: !lambda 'return x.data;'

# --- HA Native Infrared Platform ---
# These entries register the device as an infrared entity in HA, so HAIR
# can discover it as an emitter and receiver automatically.
infrared:
  - platform: ir_rf_proxy
    name: ${friendly_name} Proxy Tx
    id: ir_proxy_tx
    remote_transmitter_id: ir_tx
  - platform: ir_rf_proxy
    name: ${friendly_name} Proxy Rx
    id: ir_proxy_rx
    remote_receiver_id: ir_rx
