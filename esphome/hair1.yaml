esphome:
  name: hair1
  friendly_name: HAIR1

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: "bbe19a9538ad3038afe207b73501dca9"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "HAIR1 Fallback"
    password: !secret ap_password

captive_portal:

# --- IR Transmitter (TX) ---
remote_transmitter:
  id: ir_tx
  pin: GPIO9
  carrier_duty_percent: 50%
  non_blocking: true

# --- IR Receiver (RX) ---
# Protocol triggers fire homeassistant.event on the HA bus so HAIR's
# SignalMonitor can pick up received signals. This is an interim bridge
# until HA ships InfraredReceiverEntity (est. 2026.6-2026.7).
# See docs/internal/plans/esphome-event-bridge.md
remote_receiver:
  id: ir_rx
  pin:
    number: GPIO8
    inverted: true
    mode:
      input: true
      pullup: true
  dump: all
  tolerance: 25%
  idle: 10ms

  on_pronto:
    then:
      - homeassistant.event:
          event: esphome.remote_received
          data:
            protocol: "PRONTO"
            code: !lambda 'return x.data;'

# --- HA Native Infrared Platform (ir_rf_proxy) ---
infrared:
  - platform: ir_rf_proxy
    name: HAIR1 TX
    id: ir_proxy_tx
    remote_transmitter_id: ir_tx
  - platform: ir_rf_proxy
    name: HAIR1 RX
    id: ir_proxy_rx
    receiver_frequency: 38kHz
    remote_receiver_id: ir_rx
